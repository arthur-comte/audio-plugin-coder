name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Plugin name to build'
        required: true
        default: 'moodscopytest'
      platforms:
        description: 'Platforms to build (windows,macos,linux,all)'
        default: 'all'

jobs:
  build-windows:
    if: github.event_name == 'push' || (github.event.inputs.platforms == 'all' || contains(github.event.inputs.platforms, 'windows'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build VST3
        run: cmake --build build --config Release --target moodscopytest_VST3
      - name: Build Standalone
        run: cmake --build build --config Release --target moodscopytest_Standalone
      - uses: actions/upload-artifact@v4
        with:
          name: windows-moodscopytest
          path: build/plugins/MoodsCopyTest/moodscopytest_artefacts/Release/*

  build-macos:
    if: github.event_name == 'push' || (github.event.inputs.platforms == 'all' || contains(github.event.inputs.platforms, 'macos'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
      - name: Build All
        run: |
          cmake --build build --config Release --target moodscopytest_VST3
          cmake --build build --config Release --target moodscopytest_Standalone
      - uses: actions/upload-artifact@v4
        with:
          name: macos-moodscopytest
          path: build/plugins/MoodsCopyTest/moodscopytest_artefacts/Release/*

  build-linux:
    if: github.event_name == 'push' || (github.event.inputs.platforms == 'all' || contains(github.event.inputs.platforms, 'linux'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev libfreetype6-dev \
            libgl1-mesa-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libwebkit2gtk-4.0-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build All
        run: |
          cmake --build build --target moodscopytest_VST3
          cmake --build build --target moodscopytest_Standalone
      - uses: actions/upload-artifact@v4
        with:
          name: linux-moodscopytest
          path: build/plugins/MoodsCopyTest/moodscopytest_artefacts/*
